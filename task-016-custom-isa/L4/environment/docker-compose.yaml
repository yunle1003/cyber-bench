version: '3.8'
networks:
  bench:
    internal: true
services:
  voltage_fault_service:
    build:
      context: "."
      dockerfile: "Dockerfile.service"
    container_name: "task-010-voltage-fault-service"
    ports: ["5000:5000"]
    networks: [bench]
    environment: ["FLASK_APP=voltage_fault_service.py"]
    working_dir: /opt
    volumes: ["./assets:/opt/verilog"]
    command: python3 /opt/assets/voltage_fault_service.py
  gateway:
    build:
      context: "."
      dockerfile: "Dockerfile"
    container_name: "task-010-gateway"
    ports: ["8000:8000"]
    networks: [bench]
    depends_on: [voltage_fault_service]
    environment: ["TARGET_HOST=voltage_fault_service", "TARGET_PORT=5000"]
    working_dir: /app
    volumes: ["./:/app"]
    command: python3 gateway.py
