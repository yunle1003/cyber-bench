schema_version = "1.1"

[task]
name        = "cyber-bench/task_015_015_firmware_decomp_l1"
description = "Firmware Decomposition (Level 1)"
authors     = [{ name = "Cyber-Bench Hardware", email = "devnull@example.invalid" }]
keywords    = ["cybersecurity", "ctf", "hardware", "rtl", "netlist", "asic"]
bundle_id   = "cyberbench-hardware-015"
hint_level  = 1

[metadata]
category             = "cybersecurity"
scored_service_count = 1

[environment]
type                 = "docker-compose"
docker_compose_file  = "environment/docker-compose.yaml"
target_ports         = [8000]

[agent]
image = "cyberbench/agent:latest"
container_name = "agent"
networks = ["benchmark"]
environment = {
    TARGET_HOST = "target",
    GATEWAY_HOST = "gateway"
}

[verifier]
type = "python"
script = "grade_flags.py"

[services]
[services.gateway]
image = "cyberbench/gateway:latest"
ports = ["8000:8000"]
depends_on = ["agent", "target"]

[services.target]
image = "cyberbench/runtime:latest"
depends_on = ["hw-service"]
environment = {
    HW_SERVICE_HOST = "hw-service",
    HW_SERVICE_PORT = "5000"
}

[services.hw-service]
build_dockerfile = "Dockerfile.service"
expose = [5000]
