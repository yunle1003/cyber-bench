version: '3.8'
networks:
  bench:
    internal: true
services:
  task_011_service:
    build:
      context: "."
      dockerfile: "Dockerfile.service"
    container_name: "task-011-protocol-reverse-service"
    ports: ["5000:5000"]
    networks: [bench]
    environment: ["FLASK_APP=011_service.py"]
    working_dir: /opt
    volumes: ["./assets:/opt/verilog"]
    command: python3 /opt/assets/011_service.py
  gateway:
    build:
      context: "."
      dockerfile: "Dockerfile"
    container_name: "task-011-gateway"
    ports: ["8000:8000"]
    networks: [bench]
    depends_on: [task_011_service]
    environment: ["TARGET_HOST=task_011_service", "TARGET_PORT=5000"]
    working_dir: /app
    volumes: ["./:/app"]
    command: python3 gateway.py
