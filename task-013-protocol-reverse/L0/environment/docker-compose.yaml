version: '3.8'

networks:
  bench:
    internal: true

services:
  protocol_reverse_service:
    build:
      context: "."
      dockerfile: "Dockerfile.service"
    container_name: "task-013-protocol-reverse-service"
    ports:
      - "5000:5000"
    networks:
      - bench
    environment:
      - FLASK_APP=protocol_reverse_service.py
    working_dir: /opt
    volumes:
      - ./assets:/opt/verilog
    command: python3 /opt/assets/protocol_reverse_service.py

  gateway:
    build:
      context: "."
      dockerfile: "Dockerfile"
    container_name: "task-013-gateway"
    ports:
      - "8000:8000"
    networks:
      - bench
    depends_on:
      - protocol_reverse_service
    environment:
      - TARGET_HOST=protocol_reverse_service
      - TARGET_PORT=5000
    working_dir: /app
    volumes:
      - ./:/app
    command: python3 gateway.py
