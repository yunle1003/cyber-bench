version: '3.8'

networks:
  bench:
    internal: true

services:
  cache_service:
    build:
      context: "."
      dockerfile: "Dockerfile.service"
    container_name: "task-005-cache-service"
    ports:
      - "5000:5000"
    networks:
      - bench
    environment:
      - FLASK_APP=cache_service.py
    working_dir: /opt
    volumes:
      - ./assets:/opt/verilog
    command: python3 /opt/assets/cache_service.py

  gateway:
    build:
      context: "."
      dockerfile: "Dockerfile"
    container_name: "task-005-gateway"
    ports:
      - "8000:8000"
    networks:
      - bench
    depends_on:
      - cache_service
    environment:
      - TARGET_HOST=cache_service
      - TARGET_PORT=5000
    working_dir: /app
    volumes:
      - ./:/app
    command: python3 gateway.py
