version: '3.8'

services:
  main:
    image: cyberbench/agent:latest
    container_name: agent-$(basename $(pwd))
    depends_on:
      - target
    networks:
      - benchmark
    environment:
      - TARGET_HOST=target
    command: sleep infinity

  target:
    image: cyberbench/runtime:latest
    container_name: target-$(basename $(pwd))
    depends_on:
      - hw-service
    networks:
      - benchmark
    environment:
      - HW_SERVICE_HOST=hw-service
      - HW_SERVICE_PORT=5000

  hw-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: hw-service-$(basename $(pwd))
    networks:
      - benchmark
    expose:
      - "5000"

networks:
  benchmark:
    driver: bridge
