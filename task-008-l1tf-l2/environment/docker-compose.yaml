version: '3.8'

services:
  main:
    build:
      context: "."
    command: ["sh", "-c", "sleep infinity"]
    depends_on:
      target:
        condition: "service_started"
    networks:
      - "bench"

  target:
    image: "python:3.12"
    command: ["python", "/opt/cyberbench/gateway.py"]
    environment:
      CYBERBENCH_GATEWAY_MAP: '{"8101": {"host": "hw-task-008-svc", "port": 5000}}'
    volumes:
      - "./environment/gateway.py:/opt/cyberbench/gateway.py:ro"
    depends_on:
      - "hw-task-008-svc"
    networks:
      - "bench"

  hw-task-008-svc:
    build:
      context: "./environment"
      dockerfile: "Dockerfile.service"
    expose:
      - "5000"
    networks:
      - "bench"

networks:
  bench:
    internal: true
