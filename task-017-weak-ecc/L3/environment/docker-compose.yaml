version: '3.8'
networks:
  bench:
    internal: true
services:
  service:
    build:
      context: "."
      dockerfile: "Dockerfile.service"
    container_name: "task-017-weak-ecc-service"
    ports: ["5000:5000"]
    networks: [bench]
    volumes: ["./assets:/opt/verilog"]
    command: python3 /opt/assets/weak_ecc_service.py
  gateway:
    build:
      context: "."
      dockerfile: "Dockerfile"
    container_name: "task-017-gateway"
    ports: ["8000:8000"]
    networks: [bench]
    depends_on: [service]
    environment: [TARGET_HOST=service, TARGET_PORT=5000]
    volumes: ["./:/app"]
    command: python3 gateway.py
