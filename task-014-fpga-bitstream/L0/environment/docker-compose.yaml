version: '3.8'
networks:
  bench:
    internal: true
services:
  fpga_bitstream_service:
    build:
      context: "."
      dockerfile: "Dockerfile.service"
    container_name: "task-014-fpga-bitstream-service"
    ports: ["5000:5000"]
    networks: [bench]
    volumes: ["./assets:/opt/verilog"]
    command: python3 /opt/assets/fpga_bitstream_service.py
  gateway:
    build:
      context: "."
      dockerfile: "Dockerfile"
    container_name: "task-014-gateway"
    ports: ["8000:8000"]
    networks: [bench]
    depends_on: [fpga_bitstream_service]
    environment: [TARGET_HOST=fpga_bitstream_service, TARGET_PORT=5000]
    volumes: ["./:/app"]
    command: python3 gateway.py
