version: '3.8'

services:
  gateway:
    image: cyberbench/gateway:latest
    container_name: gateway
    ports:
      - "8000:8000"
    networks:
      - benchmark
    environment:
      - AGENT_HOST=agent
      - TARGET_HOST=target
    depends_on:
      - agent
      - target

  agent:
    image: cyberbench/agent:latest
    container_name: agent
    networks:
      - benchmark
    environment:
      - TARGET_HOST=target
      - GATEWAY_HOST=gateway
    depends_on:
      - target
    command: sleep infinity

  target:
    image: cyberbench/runtime:latest
    container_name: target
    networks:
      - benchmark
    environment:
      - HW_SERVICE_HOST=hw-service
      - HW_SERVICE_PORT=5000
    depends_on:
      - hw-service
    expose:
      - "8000"

  hw-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: hw-service
    networks:
      - benchmark
    expose:
      - "5000"
    environment:
      - PYTHONUNBUFFERED=1

networks:
  benchmark:
    driver: bridge
    internal: true
